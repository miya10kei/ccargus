# ccargus 設定ファイル
# コピーして ~/.config/ccargus/config.toml に配置してください。
# 省略した項目にはデフォルト値が適用されます。

# ---------------------------------------------------------------------------
# Claude Code 連携
# ---------------------------------------------------------------------------
[claude]
# 最新セッションを自動再開するか (--continue フラグ)
auto_continue = true
# Claude Code の実行コマンド
command = "claude"
# planning mode で起動するか
plan = false

# ---------------------------------------------------------------------------
# エディタ
# ---------------------------------------------------------------------------
[editor]
# worktree を開くエディタコマンド
command = "vim"

# ---------------------------------------------------------------------------
# Popup (エディタ / シェル共通)
# ---------------------------------------------------------------------------
[popup]
options = ["-E", "-w", "80%", "-h", "80%"]

# ---------------------------------------------------------------------------
# キーバインド (Worktree ペイン)
# ---------------------------------------------------------------------------
[keybindings]
# 新規 worktree を作成
new_worktree = "n"
# worktree を削除
delete_worktree = "d"
# エディタで開く
open_editor = "e"
# シェルを開く (tmux popup)
open_shell = "t"
# Q&A セッションを開始
qa_worktree = "s"
# Terminal ペインからエディタを開く
terminal_open_editor = "<C-e>"
# Terminal ペインからシェルを開く
terminal_open_shell = "<C-t>"

# ---------------------------------------------------------------------------
# レイアウト
# ---------------------------------------------------------------------------
[layout]
# 左ペイン (worktree ツリー) の幅 (画面幅に対する %)
worktree_pane_percent = 20
# Q&A ペインの幅 (ターミナル領域に対する %)
qa_split_percent = 50

# ---------------------------------------------------------------------------
# Worktree 管理
# ---------------------------------------------------------------------------
[worktree]
# worktree の格納ディレクトリ
base_dir = "~/.local/share/ccargus/worktrees"
# 削除を禁止するブランチ
protected_branches = ["main", "master", "develop"]
